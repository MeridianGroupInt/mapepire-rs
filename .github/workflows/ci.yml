name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      # Nightly toolchain required for the unstable rustfmt options
      # configured in `.rustfmt.toml` (wrap_comments, format_code_in_doc_comments,
      # imports_granularity, group_imports). See AGENTS.md §4.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: raven-actions/actionlint@v2
        with:
          fail-on-error: true

  check:
    name: check
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@v6
      # `dtolnay/rust-toolchain` does not tag releases; `@master` is the
      # documented usage when passing a parameterized `toolchain:` input.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-features

  msrv:
    name: msrv
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-features

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Tests with all features
        run: cargo test --all-features
      - name: Tests with rustls-tls only (default backend, explicit)
        run: cargo test --no-default-features --features rustls-tls
      - name: Tests with native-tls only (non-default backend)
        run: cargo test --no-default-features --features native-tls
      - name: Verify compile_error guard fires on missing TLS backend
        run: |
          set +e
          OUTPUT=$(cargo build --no-default-features 2>&1)
          EXIT=$?
          set -e
          if [ "$EXIT" -eq 0 ]; then
            echo "::error::Build succeeded with no TLS backend — compile_error guard is broken"
            exit 1
          fi
          if ! echo "$OUTPUT" | grep -q "mapepire requires"; then
            echo "::error::Build failed without the expected 'mapepire requires' message"
            echo "$OUTPUT"
            exit 1
          fi
          echo "compile_error guard fired correctly"

  docs:
    name: docs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --all-features

  audit:
    name: audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Generate Cargo.lock for audit
        run: cargo generate-lockfile
      # TODO(PRO-395): bump when Node-24 release available — currently on Node 20 (deprecated 2026-09-16)
      # Ignored advisory: rcgen (dev-dep) pulls time 0.3.45 which has a
      # stack-exhaustion CVE in RFC-2822 parsing. rcgen never invokes
      # parsing, only DER serialization — unreachable code path.
      # Justification + analysis lives in deny.toml's [advisories.ignore].
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore: RUSTSEC-2026-0009

  deny:
    name: deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Generate Cargo.lock for deny
        run: cargo generate-lockfile
      - uses: EmbarkStudios/cargo-deny-action@v2
