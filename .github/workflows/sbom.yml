name: SBOM

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"

permissions:
  contents: read

jobs:
  generate:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Resolve dependencies (so Cargo.lock exists for Syft to scan)
        run: cargo generate-lockfile

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          artifact-name: mapepire-sbom.cyclonedx.json

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          artifact-name: mapepire-sbom.spdx.json
