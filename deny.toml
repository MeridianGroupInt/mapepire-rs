# Supply-chain policy for `mapepire`. Enforced by `cargo deny check` (run
# via `make deny` or in CI).
#
# Tightened over the typical default: duplicate dependency *versions* are
# denied (most common cause of accidental binary bloat and subtle
# compatibility bugs). Add specific exceptions to `[bans] skip` only after
# confirming the duplicate is unavoidable.

[graph]
all-features = true

[advisories]
yanked = "deny"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
skip = [
    # WASI-only deps pulled twice via getrandom 0.3 (proptest path) and
    # getrandom 0.4 (tempfile path). They are cfg(target_os = "wasi")-only
    # so the duplicates never reach our supported Linux/macOS/Windows
    # builds. Re-evaluate when the upstream `tempfile` / `proptest` /
    # `rand` deps converge their getrandom major versions.
    { crate = "getrandom" },
    { crate = "r-efi" },
    { crate = "wit-bindgen" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
