# Supply-chain policy for `mapepire`. Enforced by `cargo deny check` (run
# via `make deny` or in CI).
#
# Tightened over the typical default: duplicate dependency *versions* are
# denied (most common cause of accidental binary bloat and subtle
# compatibility bugs). Add specific exceptions to `[bans] skip` only after
# confirming the duplicate is unavoidable.

[graph]
all-features = true

[advisories]
yanked = "deny"
ignore = [
    # RUSTSEC-2026-0009: time v0.3.45 stack exhaustion via RFC 2822 parsing.
    # Only affects user-controlled RFC 2822 input — rcgen uses time for X.509
    # validity dates, not for parsing untrusted strings, so the attack surface
    # does not apply. The fix (0.3.47) requires Rust 1.88.0; this crate targets
    # Rust 1.85 and cannot upgrade until the MSRV is raised in a future release.
    { id = "RUSTSEC-2026-0009", reason = "time is used by rcgen (dev-only) for X.509 date encoding, not RFC 2822 parsing; unreachable code path. Fix requires Rust 1.88.0 which exceeds our MSRV 1.85." },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
skip = [
    # WASI-only deps pulled twice via getrandom 0.3 (proptest path) and
    # getrandom 0.4 (tempfile path). They are cfg(target_os = "wasi")-only
    # so the duplicates never reach our supported Linux/macOS/Windows
    # builds. Re-evaluate when the upstream `tempfile` / `proptest` /
    # `rand` deps converge their getrandom major versions.
    { crate = "getrandom" },
    { crate = "r-efi" },
    { crate = "wit-bindgen" },
    # windows-sys 0.52 is pulled by `ring` (via rcgen dev-dep) and
    # windows-sys 0.61 by tokio/mio/rustix/etc. The 0.52 copy is
    # compile-time Windows-only sys glue inside ring's build and never
    # coexists at link time with the 0.61 copy on our supported targets.
    # Re-evaluate when ring upgrades its windows-sys dependency.
    { crate = "windows-sys" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
